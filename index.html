<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Intrinsic Value Calculator</title>
  <meta name="description" content="Multi-model stock valuation tool using DCF, DDM, P/E Multiple, and Graham Number with conditional blending." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0e12; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    ::selection { background: #4a9eff33; }
    select { appearance: none; -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const SECTORS = [
      "Technology", "Healthcare", "Financials", "Energy", "Industrials",
      "Consumer Discretionary", "Consumer Staples", "Utilities", "Real Estate",
      "Materials", "Communication Services", "Software", "Services"
    ];

    const SERVICE_SECTORS = ["technology", "healthcare", "services", "software"];

    function calcDCF(fcf, gFcf, gTerminal, r, years = 5) {
      let dcfValue = 0;
      for (let t = 1; t <= years; t++) {
        const projectedFcf = fcf * Math.pow(1 + gFcf, t);
        dcfValue += projectedFcf / Math.pow(1 + r, t);
      }
      const terminalFcf = fcf * Math.pow(1 + gFcf, years);
      const terminalValue = (terminalFcf * (1 + gTerminal)) / (r - gTerminal);
      const pvTerminal = terminalValue / Math.pow(1 + r, years);
      return { projectedValue: dcfValue, terminalPV: pvTerminal, total: dcfValue + pvTerminal };
    }

    function calcDDM(dividend, gDiv, r) {
      if (dividend <= 0) return 0;
      const safeG = Math.min(gDiv, r - 0.01);
      return (dividend * (1 + safeG)) / (r - safeG);
    }

    function calcPE(epsFwd, peTarget, r) {
      if (epsFwd <= 0) return 0;
      return (epsFwd * peTarget) / (1 + r);
    }

    function calcGraham(epsTtm, bvps) {
      if (epsTtm <= 0 || bvps <= 0) return 0;
      return Math.sqrt(22.5 * epsTtm * bvps);
    }

    function evaluate(params) {
      const { price, epsTtm, epsFwd, bvps, dividend, gDiv, fcf, gFcf, gTerminal, r, peTarget, sector } = params;
      const dcfResult = calcDCF(fcf, gFcf, gTerminal, r);
      const vDcf = dcfResult.total;
      const vDdm = calcDDM(dividend, gDiv, r);
      const vPe = calcPE(epsFwd, peTarget, r);
      const vGraham = calcGraham(epsTtm, bvps);

      const weights = { DCF: 0.25, DDM: 0.25, PE: 0.25, Graham: 0.25 };
      if (dividend <= 0) weights.DDM = 0;
      if (bvps <= 0 || SERVICE_SECTORS.includes(sector.toLowerCase())) weights.Graham = 0;
      if (epsTtm <= 0) { weights.Graham = 0; weights.PE = 0; }

      const activeCount = Object.values(weights).filter(w => w > 0).length;
      if (activeCount === 0) return null;
      const adj = 1.0 / activeCount;
      for (const key in weights) { if (weights[key] > 0) weights[key] = adj; }

      const blended = vDcf * weights.DCF + vDdm * weights.DDM + vPe * weights.PE + vGraham * weights.Graham;
      const discount = ((blended - price) / blended) * 100;
      const marginOfSafety = ((blended - price) / blended) * 100;

      return {
        models: { DCF: vDcf, DDM: vDdm, PE: vPe, Graham: vGraham },
        weights, blended, discount, marginOfSafety, dcfResult,
        verdict: price < blended ? "UNDERVALUED" : "OVERVALUED"
      };
    }

    function sensitivityTable(params) {
      const rates = [-0.02, -0.01, 0, 0.01, 0.02];
      const growths = [-0.02, -0.01, 0, 0.01, 0.02];
      return rates.map(dr => growths.map(dg => {
        const r = Math.max(params.r + dr, 0.02);
        const gFcf = params.gFcf + dg;
        const gTerminal = Math.min(params.gTerminal, r - 0.01);
        const res = evaluate({ ...params, r, gFcf, gTerminal });
        return res ? res.blended : 0;
      }));
    }

    const fmt = (v) => v >= 1000 ? "$" + (v/1000).toFixed(1) + "k" : "$" + v.toFixed(2);
    const pct = (v) => (v * 100).toFixed(1) + "%";

    function InputField({ label, value, onChange, suffix, step = "0.01", min, tooltip }) {
      const [focused, setFocused] = useState(false);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          <label style={{
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
            fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase",
            color: "#8a8f98", fontWeight: 500
          }}>
            {label}
            {tooltip && <span style={{ marginLeft: 4, color: "#565b64", cursor: "help" }} title={tooltip}>ⓘ</span>}
          </label>
          <div style={{ position: "relative" }}>
            <input
              type="number" value={value} step={step} min={min}
              onChange={e => onChange(parseFloat(e.target.value) || 0)}
              onFocus={() => setFocused(true)}
              onBlur={() => setFocused(false)}
              style={{
                width: "100%", boxSizing: "border-box",
                background: "#13151a", border: "1px solid " + (focused ? "#4a9eff" : "#2a2d35"),
                borderRadius: 6, padding: "8px 10px",
                paddingRight: suffix ? 32 : 10,
                color: "#e8eaed", fontFamily: "'JetBrains Mono', monospace",
                fontSize: 13, outline: "none", transition: "border-color 0.15s"
              }}
            />
            {suffix && <span style={{
              position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)",
              color: "#565b64", fontSize: 11, fontFamily: "'JetBrains Mono', monospace"
            }}>{suffix}</span>}
          </div>
        </div>
      );
    }

    function ModelCard({ name, value, weight, price, icon }) {
      const isActive = weight > 0;
      const isAbove = value > price && isActive;
      return (
        <div style={{
          background: isActive ? "#16181e" : "#111318",
          border: "1px solid " + (isActive ? "#2a2d35" : "#1e2028"),
          borderRadius: 10, padding: "14px 16px",
          opacity: isActive ? 1 : 0.4,
          transition: "all 0.3s ease"
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
              letterSpacing: "0.1em", textTransform: "uppercase", color: "#8a8f98"
            }}>{icon} {name}</span>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
              background: isActive ? "#1e2a3a" : "#1a1c22",
              color: isActive ? "#4a9eff" : "#444",
              padding: "2px 7px", borderRadius: 4
            }}>{(weight * 100).toFixed(0)}%</span>
          </div>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 20, fontWeight: 700,
            color: !isActive ? "#444" : isAbove ? "#34d399" : "#f87171"
          }}>
            {isActive ? fmt(value) : "N/A"}
          </div>
          {isActive && <div style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 10, marginTop: 4,
            color: isAbove ? "#34d39988" : "#f8717188"
          }}>
            {isAbove ? "▲" : "▼"} {Math.abs(((value - price) / price) * 100).toFixed(1)}% vs price
          </div>}
        </div>
      );
    }

    function BarGauge({ price, blended }) {
      const min = Math.min(price, blended) * 0.7;
      const max = Math.max(price, blended) * 1.3;
      const range = max - min;
      const pricePos = ((price - min) / range) * 100;
      const blendedPos = ((blended - min) / range) * 100;
      const isUnder = price < blended;

      return (
        <div style={{ position: "relative", height: 40, margin: "16px 0 8px" }}>
          <div style={{
            position: "absolute", top: 16, left: 0, right: 0, height: 8,
            background: "#1e2028", borderRadius: 4, overflow: "hidden"
          }}>
            <div style={{
              position: "absolute",
              left: Math.min(pricePos, blendedPos) + "%",
              width: Math.abs(blendedPos - pricePos) + "%",
              height: "100%",
              background: isUnder
                ? "linear-gradient(90deg, #f8717144, #34d39944)"
                : "linear-gradient(90deg, #34d39944, #f8717144)",
              borderRadius: 4
            }} />
          </div>
          <div style={{
            position: "absolute", left: pricePos + "%", top: 0, transform: "translateX(-50%)",
            display: "flex", flexDirection: "column", alignItems: "center"
          }}>
            <span style={{ fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: "#f87171", whiteSpace: "nowrap" }}>MKT</span>
            <div style={{ width: 2, height: 22, background: "#f87171", borderRadius: 1 }} />
          </div>
          <div style={{
            position: "absolute", left: blendedPos + "%", top: 0, transform: "translateX(-50%)",
            display: "flex", flexDirection: "column", alignItems: "center"
          }}>
            <span style={{ fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: "#34d399", whiteSpace: "nowrap" }}>IV</span>
            <div style={{ width: 2, height: 22, background: "#34d399", borderRadius: 1 }} />
          </div>
        </div>
      );
    }

    function StockValuator() {
      const [params, setParams] = useState({
        ticker: "UNH", price: 269.35, epsTtm: 13.23, epsFwd: 17.75,
        bvps: 106.0, dividend: 8.84, gDiv: 0.06, fcf: 16.0,
        gFcf: 0.06, gTerminal: 0.025, r: 0.09, peTarget: 17.0, sector: "Healthcare"
      });
      const [showSensitivity, setShowSensitivity] = useState(false);
      const [sensHover, setSensHover] = useState(false);

      const set = (key) => (val) => setParams(p => ({ ...p, [key]: val }));
      const result = useMemo(() => evaluate(params), [params]);
      const sensData = useMemo(() => showSensitivity ? sensitivityTable(params) : null, [params, showSensitivity]);

      return (
        <div style={{
          minHeight: "100vh", background: "#0c0e12", color: "#e8eaed",
          fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
          padding: "24px 20px"
        }}>
          {/* Header */}
          <div style={{ maxWidth: 920, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 4 }}>
              <h1 style={{
                fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700,
                color: "#e8eaed", letterSpacing: "-0.02em"
              }}>Intrinsic Value</h1>
              <span style={{ fontSize: 10, color: "#565b64", letterSpacing: "0.08em" }}>MULTI-MODEL</span>
            </div>
            <p style={{ fontSize: 11, color: "#565b64", marginBottom: 28, lineHeight: 1.5 }}>
              DCF · Dividend Discount · P/E Multiple · Graham Number — blended with conditional weighting
            </p>

            <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 24, alignItems: "start" }}>
              {/* Input Panel */}
              <div style={{
                background: "#111318", border: "1px solid #1e2028",
                borderRadius: 12, padding: 20, display: "flex", flexDirection: "column", gap: 18
              }}>
                {/* Ticker & Sector */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                    <label style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "#8a8f98" }}>Ticker</label>
                    <input
                      type="text" value={params.ticker}
                      onChange={e => setParams(p => ({ ...p, ticker: e.target.value.toUpperCase() }))}
                      style={{
                        background: "#13151a", border: "1px solid #2a2d35", borderRadius: 6,
                        padding: "8px 10px", color: "#4a9eff", fontFamily: "'JetBrains Mono', monospace",
                        fontSize: 15, fontWeight: 700, outline: "none", width: "100%", boxSizing: "border-box"
                      }}
                    />
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                    <label style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "#8a8f98" }}>Sector</label>
                    <select
                      value={params.sector}
                      onChange={e => setParams(p => ({ ...p, sector: e.target.value }))}
                      style={{
                        background: "#13151a", border: "1px solid #2a2d35", borderRadius: 6,
                        padding: "8px 10px", color: "#e8eaed", fontFamily: "'JetBrains Mono', monospace",
                        fontSize: 11, outline: "none", width: "100%", boxSizing: "border-box", cursor: "pointer"
                      }}
                    >
                      {SECTORS.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                </div>

                <div style={{ height: 1, background: "#1e2028" }} />

                {/* Price & Earnings */}
                <div>
                  <div style={{ fontSize: 9, color: "#565b64", letterSpacing: "0.12em", marginBottom: 10, textTransform: "uppercase" }}>Price & Earnings</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <InputField label="Market Price" value={params.price} onChange={set("price")} suffix="$" />
                    <InputField label="EPS (TTM)" value={params.epsTtm} onChange={set("epsTtm")} suffix="$" tooltip="Trailing 12-month earnings per share" />
                    <InputField label="EPS (Fwd)" value={params.epsFwd} onChange={set("epsFwd")} suffix="$" tooltip="Forward consensus estimate" />
                    <InputField label="Book Value/Sh" value={params.bvps} onChange={set("bvps")} suffix="$" />
                  </div>
                </div>

                <div style={{ height: 1, background: "#1e2028" }} />

                {/* Cash Flow & Dividends */}
                <div>
                  <div style={{ fontSize: 9, color: "#565b64", letterSpacing: "0.12em", marginBottom: 10, textTransform: "uppercase" }}>Cash Flow & Dividends</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <InputField label="FCF / Share" value={params.fcf} onChange={set("fcf")} suffix="$" tooltip="Free cash flow per share" />
                    <InputField label="FCF Growth" value={params.gFcf} onChange={set("gFcf")} step="0.005" tooltip="Annual FCF growth rate (decimal)" />
                    <InputField label="Dividend / Sh" value={params.dividend} onChange={set("dividend")} suffix="$" />
                    <InputField label="Div Growth" value={params.gDiv} onChange={set("gDiv")} step="0.005" />
                  </div>
                </div>

                <div style={{ height: 1, background: "#1e2028" }} />

                {/* Model Parameters */}
                <div>
                  <div style={{ fontSize: 9, color: "#565b64", letterSpacing: "0.12em", marginBottom: 10, textTransform: "uppercase" }}>Model Parameters</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <InputField label="Discount Rate" value={params.r} onChange={set("r")} step="0.005" min="0.01" tooltip="Required rate of return (WACC)" />
                    <InputField label="Terminal Growth" value={params.gTerminal} onChange={set("gTerminal")} step="0.005" tooltip="Long-term perpetuity growth" />
                    <InputField label="Target P/E" value={params.peTarget} onChange={set("peTarget")} step="0.5" tooltip="Fair P/E multiple for sector" />
                  </div>
                </div>
              </div>

              {/* Results Panel */}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {result ? (
                  <>
                    {/* Verdict Banner */}
                    <div style={{
                      background: result.verdict === "UNDERVALUED"
                        ? "linear-gradient(135deg, #0a2a1f, #112820)"
                        : "linear-gradient(135deg, #2a0f0f, #281414)",
                      border: "1px solid " + (result.verdict === "UNDERVALUED" ? "#1a4a35" : "#4a1a1a"),
                      borderRadius: 12, padding: "20px 24px"
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{
                            fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase",
                            color: result.verdict === "UNDERVALUED" ? "#34d399" : "#f87171",
                            marginBottom: 6, fontWeight: 600
                          }}>
                            {params.ticker} · {result.verdict}
                          </div>
                          <div style={{
                            fontFamily: "'Space Grotesk', sans-serif", fontSize: 36, fontWeight: 700,
                            color: result.verdict === "UNDERVALUED" ? "#34d399" : "#f87171"
                          }}>
                            {fmt(result.blended)}
                          </div>
                          <div style={{ fontSize: 11, color: "#8a8f98", marginTop: 4 }}>
                            Blended Intrinsic Value
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 10, color: "#8a8f98", marginBottom: 4 }}>Market Price</div>
                          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 600, color: "#e8eaed" }}>
                            ${params.price.toFixed(2)}
                          </div>
                          <div style={{
                            fontSize: 13, fontWeight: 600, marginTop: 4,
                            color: result.discount > 0 ? "#34d399" : "#f87171"
                          }}>
                            {result.discount > 0 ? "▲" : "▼"} {Math.abs(result.discount).toFixed(1)}% {result.discount > 0 ? "upside" : "downside"}
                          </div>
                        </div>
                      </div>
                      <BarGauge price={params.price} blended={result.blended} />
                      {/* Margin of Safety */}
                      <div style={{
                        marginTop: 8, padding: "8px 12px",
                        background: "#0c0e1266", borderRadius: 6,
                        display: "flex", justifyContent: "space-between", alignItems: "center"
                      }}>
                        <span style={{ fontSize: 10, color: "#8a8f98" }}>Margin of Safety</span>
                        <span style={{
                          fontSize: 13, fontWeight: 600,
                          color: result.marginOfSafety >= 30 ? "#34d399" : result.marginOfSafety >= 15 ? "#fbbf24" : "#f87171"
                        }}>
                          {result.marginOfSafety.toFixed(1)}%
                          <span style={{ fontSize: 9, color: "#565b64", marginLeft: 6 }}>
                            {result.marginOfSafety >= 30 ? "Strong" : result.marginOfSafety >= 15 ? "Moderate" : "Weak"}
                          </span>
                        </span>
                      </div>
                    </div>

                    {/* Model Breakdown */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      <ModelCard name="DCF" value={result.models.DCF} weight={result.weights.DCF} price={params.price} icon="◆" />
                      <ModelCard name="DDM" value={result.models.DDM} weight={result.weights.DDM} price={params.price} icon="◇" />
                      <ModelCard name="P/E Multiple" value={result.models.PE} weight={result.weights.PE} price={params.price} icon="▣" />
                      <ModelCard name="Graham №" value={result.models.Graham} weight={result.weights.Graham} price={params.price} icon="△" />
                    </div>

                    {/* DCF Breakdown */}
                    <div style={{
                      background: "#111318", border: "1px solid #1e2028",
                      borderRadius: 10, padding: "14px 16px"
                    }}>
                      <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#8a8f98", marginBottom: 10 }}>DCF Breakdown</div>
                      <div style={{ display: "flex", gap: 20 }}>
                        <div>
                          <div style={{ fontSize: 9, color: "#565b64" }}>5-Year PV of FCF</div>
                          <div style={{ fontSize: 15, fontWeight: 600, color: "#4a9eff" }}>{fmt(result.dcfResult.projectedValue)}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: "#565b64" }}>PV of Terminal</div>
                          <div style={{ fontSize: 15, fontWeight: 600, color: "#818cf8" }}>{fmt(result.dcfResult.terminalPV)}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: "#565b64" }}>Terminal % of Total</div>
                          <div style={{ fontSize: 15, fontWeight: 600, color: "#8a8f98" }}>
                            {((result.dcfResult.terminalPV / result.dcfResult.total) * 100).toFixed(0)}%
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Active Rules */}
                    <div style={{
                      background: "#111318", border: "1px solid #1e2028",
                      borderRadius: 10, padding: "14px 16px"
                    }}>
                      <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#8a8f98", marginBottom: 8 }}>Active Rules</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                        {params.dividend <= 0 && (
                          <span style={{ fontSize: 10, background: "#1e2028", color: "#fbbf24", padding: "3px 8px", borderRadius: 4 }}>
                            A: No dividend → DDM disabled
                          </span>
                        )}
                        {(params.bvps <= 0 || SERVICE_SECTORS.includes(params.sector.toLowerCase())) && (
                          <span style={{ fontSize: 10, background: "#1e2028", color: "#fbbf24", padding: "3px 8px", borderRadius: 4 }}>
                            B: {params.bvps <= 0 ? "Negative BVPS" : "Service sector"} → Graham disabled
                          </span>
                        )}
                        {params.epsTtm <= 0 && (
                          <span style={{ fontSize: 10, background: "#1e2028", color: "#fbbf24", padding: "3px 8px", borderRadius: 4 }}>
                            C: Negative EPS → Graham & P/E disabled
                          </span>
                        )}
                        {params.dividend > 0 && params.gDiv >= params.r && (
                          <span style={{ fontSize: 10, background: "#1e2028", color: "#fbbf24", padding: "3px 8px", borderRadius: 4 }}>
                            D: g_div ≥ r → capped at {pct(params.r - 0.01)}
                          </span>
                        )}
                        {params.dividend > 0 && params.gDiv < params.r &&
                         !(params.bvps <= 0 || SERVICE_SECTORS.includes(params.sector.toLowerCase())) &&
                         params.epsTtm > 0 && (
                          <span style={{ fontSize: 10, background: "#1e2028", color: "#565b64", padding: "3px 8px", borderRadius: 4 }}>
                            All models active — equal weighting
                          </span>
                        )}
                      </div>
                    </div>

                    {/* Sensitivity Toggle */}
                    <button
                      onClick={() => setShowSensitivity(!showSensitivity)}
                      onMouseEnter={() => setSensHover(true)}
                      onMouseLeave={() => setSensHover(false)}
                      style={{
                        background: "#111318", border: "1px solid " + (sensHover ? "#4a9eff" : "#2a2d35"),
                        borderRadius: 8, padding: "10px 16px", color: "#8a8f98",
                        fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                        cursor: "pointer", textAlign: "left", transition: "border-color 0.15s"
                      }}
                    >
                      {showSensitivity ? "▾" : "▸"} Sensitivity Analysis (Discount Rate × FCF Growth)
                    </button>

                    {showSensitivity && sensData && (
                      <div style={{
                        background: "#111318", border: "1px solid #1e2028",
                        borderRadius: 10, padding: 16, overflowX: "auto"
                      }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                          <thead>
                            <tr>
                              <th style={{ padding: "6px 8px", color: "#565b64", textAlign: "left", fontSize: 9 }}>r \ g_fcf</th>
                              {[-0.02, -0.01, 0, 0.01, 0.02].map(dg => (
                                <th key={dg} style={{ padding: "6px 8px", color: "#8a8f98", textAlign: "right", fontSize: 10 }}>
                                  {pct(params.gFcf + dg)}
                                </th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {sensData.map((row, ri) => {
                              const dr = [-0.02, -0.01, 0, 0.01, 0.02][ri];
                              return (
                                <tr key={ri}>
                                  <td style={{ padding: "6px 8px", color: "#8a8f98", fontWeight: 500, fontSize: 10 }}>
                                    {pct(params.r + dr)}
                                  </td>
                                  {row.map((val, ci) => {
                                    const isCenter = ri === 2 && ci === 2;
                                    return (
                                      <td key={ci} style={{
                                        padding: "6px 8px", textAlign: "right",
                                        color: val > params.price ? "#34d399" : "#f87171",
                                        fontWeight: isCenter ? 700 : 400,
                                        background: isCenter ? "#1e2a3a" : "transparent",
                                        borderRadius: isCenter ? 4 : 0
                                      }}>
                                        {fmt(val)}
                                      </td>
                                    );
                                  })}
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                        <div style={{ fontSize: 9, color: "#565b64", marginTop: 8, textAlign: "center" }}>
                          Green = above market price · Highlighted = current inputs
                        </div>
                      </div>
                    )}

                    {/* Disclaimer */}
                    <div style={{
                      fontSize: 9, color: "#3a3d45", lineHeight: 1.5,
                      padding: "8px 0", borderTop: "1px solid #1a1c22"
                    }}>
                      This is an educational tool, not financial advice. Models use simplified assumptions.
                      Always conduct thorough due diligence before making investment decisions.
                    </div>
                  </>
                ) : (
                  <div style={{
                    background: "#111318", border: "1px solid #2a2d35",
                    borderRadius: 12, padding: 40, textAlign: "center", color: "#565b64"
                  }}>
                    No valid valuation models available for this input combination.
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(React.StrictMode, null, React.createElement(StockValuator))
    );
  </script>
</body>
</html>
